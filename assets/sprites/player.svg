<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96">
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7cc8ff"/>
      <stop offset="1" stop-color="#2a6fb5"/>
    </linearGradient>
    <linearGradient id="thrusterGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffb84d"/>
      <stop offset="1" stop-color="#ff5a2c" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- thruster glow -->
  <ellipse cx="14" cy="48" rx="16" ry="6" fill="url(#thrusterGrad)" opacity="0.85"/>
  <!-- main body (pointing right, since look_at uses +X) -->
  <polygon points="86,48 30,20 42,48 30,76" fill="url(#bodyGrad)" stroke="#0d1b2a" stroke-width="2" stroke-linejoin="round"/>
  <!-- wing accents -->
  <polygon points="30,20 50,28 50,48 42,48" fill="#3a8ed6" stroke="#0d1b2a" stroke-width="1.5"/>
  <polygon points="30,76 50,68 50,48 42,48" fill="#3a8ed6" stroke="#0d1b2a" stroke-width="1.5"/>
  <!-- cockpit -->
  <ellipse cx="60" cy="48" rx="10" ry="6" fill="#dff6ff" stroke="#0d1b2a" stroke-width="1.5"/>
  <ellipse cx="62" cy="46" rx="3" ry="2" fill="#ffffff" opacity="0.7"/>
</svg>
